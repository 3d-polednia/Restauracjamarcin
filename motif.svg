<svg xmlns="http://www.w3.org/2000/svg" width="260" height="260" viewBox="0 0 260 260">
  <defs>
    <g id="chaber">
      <!-- chaber / cornflower: promieniste płatki + środek -->
      <g fill="#ffffff" fill-opacity="0.11">
        <g id="petal-set">
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z"/>
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z" transform="rotate(60)"/>
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z" transform="rotate(120)"/>
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z" transform="rotate(180)"/>
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z" transform="rotate(240)"/>
          <path d="M0,-26 C4,-18 4,-9 0,-3 C-4,-9 -4,-18 0,-26 Z" transform="rotate(300)"/>
        </g>
      </g>
      <circle r="4.5" fill="#ffffff" fill-opacity="0.16"/>
    </g>
    <g id="sprig">
      <!-- gałązka: łodyga + dwa listki + kropki -->
      <path d="M0,0 C6,-14 4,-30 -2,-42" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.4"/>
      <ellipse cx="7" cy="-14" rx="6" ry="2.4" fill="#ffffff" fill-opacity="0.08" transform="rotate(28 7 -14)"/>
      <ellipse cx="-6" cy="-26" rx="6" ry="2.4" fill="#ffffff" fill-opacity="0.08" transform="rotate(-28 -6 -26)"/>
      <circle cx="-2" cy="-42" r="2" fill="#ffffff" fill-opacity="0.14"/>
    </g>
  </defs>

  <use href="#chaber" transform="translate(55 60)"/>
  <use href="#sprig"  transform="translate(150 78) rotate(24)"/>
  <use href="#chaber" transform="translate(196 150) scale(0.8)"/>
  <use href="#sprig"  transform="translate(70 175) rotate(-18) scale(0.9)"/>
  <use href="#chaber" transform="translate(122 210) scale(0.62)"/>
  <use href="#sprig"  transform="translate(232 218) rotate(40) scale(0.75)"/>
  <use href="#chaber" transform="translate(18 128) scale(0.5)"/>
</svg>
